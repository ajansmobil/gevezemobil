<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!--
    Web surumu: ana HTML dokumaninin ve ust seviye navigasyonlarin CDN/tarayici cache'inde
    eski surum kalmasini zorlastirir (kesin degil; asil cozum `flutter build web --pwa-strategy none`).
    Statik dosyalar icin sunucu tarafinda Cache-Control da ayarlanmalidir (Pages / Workers).
  -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="description" content="VEoutdoor">

  <!--
    Google Haritalar (Flutter Web / google_maps_flutter_web) — ZORUNLU.
    Google Cloud Console: "Maps JavaScript API" etkin + API anahtari.
    Uretim: HTTP referrer ile kisitlayin (or. https://mobil.gevezeajans.com/*).
    Yerel: asagidaki AIzaSyD9MSSZWkz9GApWal0AoEZy5hHdVcE5cjw degerini gercek anahtarla degistirin
    veya GitHub Actions secret MAPS_WEB_API_KEY ile build oncesi enjekte edin.
    Android anahtari ayri olabilir; web icin referrer kisitli anahtar onerilir.
  -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD9MSSZWkz9GApWal0AoEZy5hHdVcE5cjw"></script>

  <!-- iOS meta etiketleri ve ana ekran ikonlari -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="VEoutdoor">
  <!--
    Apple touch ikon: `pubspec.yaml` icindeki `assets/icon.png` tek kaynak.
    Flutter web ciktisinda bu dosya kokten `assets/assets/icon.png` olarak
    sunulur (ilk `assets/` Flutter varlik kok dizini; ikincisi projedeki
    `assets/` klasoru). `web/icons/*.png` kopyalari tutulmaz.
  -->
  <link rel="apple-touch-icon" href="assets/assets/icon.png">

  <!--
    Tarayici sekmesi / yer imi favicon: yine `assets/icon.png` (tek kaynak).
    `web/favicon.png` yerine bu yol kullanilir; boylece mobil launcher ile
    ayni logo dosyasi web tarafinda da guncellenir.
  -->
  <link rel="icon" type="image/png" href="assets/assets/icon.png"/>

  <title>VEoutdoor</title>
  <!--
    manifest.json degistiginde tarayici eski dosyayi tutabilir; ?v= surumunu artirin.
  -->
  <link rel="manifest" href="manifest.json?v=2">
</head>
<body>
  <!--
    Flutter Web onbellek notu:
    - Meta Cache-Control HTML'i CDN'den koruyamaz; eski service worker main.dart.js tutar.
    - Kalici: `flutter build web --release --pwa-strategy none` (bkz. build_web.ps1) + sunucu basliklari (web/_headers).
    - Asagidaki script: once SW + Cache Storage temizlenir, sonra flutter_bootstrap yuklenir (yaris kosulu olmaz).
  -->
  <script>
    (function () {
      function loadFlutterBootstrap() {
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js';
        s.async = true;
        document.body.appendChild(s);
      }
      var p = Promise.resolve();
      if ('serviceWorker' in navigator) {
        p = p.then(function () {
          return navigator.serviceWorker.getRegistrations();
        }).then(function (regs) {
          return Promise.all(regs.map(function (r) { return r.unregister(); }));
        });
      }
      if ('caches' in window) {
        p = p.then(function () {
          return caches.keys();
        }).then(function (keys) {
          return Promise.all(keys.map(function (k) { return caches.delete(k); }));
        });
      }
      p.then(loadFlutterBootstrap).catch(function (e) {
        console.warn('VEoutdoor: onbellek temizligi', e);
        loadFlutterBootstrap();
      });
    })();
  </script>
</body>
</html>
