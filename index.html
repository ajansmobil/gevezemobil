<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Geveze Ajans Mobil">

  <!--
    Google Haritalar (Flutter Web / google_maps_flutter_web) — ZORUNLU.
    Google Cloud Console: "Maps JavaScript API" etkin + API anahtari.
    Uretim: HTTP referrer ile kisitlayin (or. https://mobil.gevezeajans.com/*).
    Yerel: asagidaki AIzaSyD9MSSZWkz9GApWal0AoEZy5hHdVcE5cjw degerini gercek anahtarla degistirin
    veya GitHub Actions secret MAPS_WEB_API_KEY ile build oncesi enjekte edin.
    Android anahtari ayri olabilir; web icin referrer kisitli anahtar onerilir.
  -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD9MSSZWkz9GApWal0AoEZy5hHdVcE5cjw"></script>

  <!-- iOS meta etiketleri ve ana ekran ikonlari -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="gevezeajans">
  <!--
    Apple touch ikon: `pubspec.yaml` icindeki `assets/icon.png` tek kaynak.
    Flutter web ciktisinda bu dosya kokten `assets/assets/icon.png` olarak
    sunulur (ilk `assets/` Flutter varlik kok dizini; ikincisi projedeki
    `assets/` klasoru). `web/icons/*.png` kopyalari tutulmaz.
  -->
  <link rel="apple-touch-icon" href="assets/assets/icon.png">

  <!--
    Tarayici sekmesi / yer imi favicon: yine `assets/icon.png` (tek kaynak).
    `web/favicon.png` yerine bu yol kullanilir; boylece mobil launcher ile
    ayni logo dosyasi web tarafinda da guncellenir.
  -->
  <link rel="icon" type="image/png" href="assets/assets/icon.png"/>

  <title>gevezeajans</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to provide the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
